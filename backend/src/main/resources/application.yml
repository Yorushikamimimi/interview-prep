server:
  port: 8081

spring:
  datasource:
    url: jdbc:sqlite:${user.dir}/data/interview.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

interview:
  # 题库根目录：优先读环境变量 CONTENT_PATH，默认指向 backend/ 同级的 面试/ 目录
  content-path: ${CONTENT_PATH:${user.dir}/../面试}
